name: Build APK

on:
  workflow_dispatch:
    inputs:
      variant:
        description: "Build variant"
        required: true
        default: "release"
        type: choice
        options:
          - debug
          - release

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build selected APK
        run: |
          if [ "${{ inputs.variant }}" = "release" ]; then
            ./gradlew :mobile:assembleRelease --no-daemon
          else
            ./gradlew :mobile:assembleDebug --no-daemon
          fi

      - name: Upload debug APKs
        if: ${{ inputs.variant == 'debug' }}
        uses: actions/upload-artifact@v5
        with:
          name: vpnhotspot-debug-apks
          path: mobile/build/outputs/apk/debug/*.apk

      - name: Upload release APKs
        if: ${{ inputs.variant == 'release' }}
        uses: actions/upload-artifact@v5
        with:
          name: vpnhotspot-release-apks
          path: mobile/build/outputs/apk/release/*.apk

      - name: Upload release mapping
        if: ${{ inputs.variant == 'release' }}
        uses: actions/upload-artifact@v5
        with:
          name: vpnhotspot-release-mapping
          path: mobile/build/outputs/mapping/release/
          if-no-files-found: ignore
